<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seguimiento de Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --card: #191d28;
      --border: #252a38;
      --accent: #e8c547;
      --accent2: #4f8ef7;
      --text: #eef0f6;
      --muted: #7a8099;
      --danger: #f25c5c;
      --success: #4ecb8d;
      --warning: #f0a044;
      --info: #4f8ef7;
      --review: #b07ef7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── CONFIG OVERLAY ── */
    #config-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }
    .config-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 480px;
      max-width: 95vw;
    }
    .config-box h2 { font-family: 'Syne', sans-serif; font-size: 1.6rem; margin-bottom: 8px; color: var(--accent); }
    .config-box p { color: var(--muted); font-size: .9rem; margin-bottom: 28px; line-height: 1.5; }
    .config-box label { display: block; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .config-box input {
      width: 100%; padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: .9rem; margin-bottom: 18px; outline: none;
      transition: border-color .2s;
    }
    .config-box input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--accent);
      color: #0d0f14; border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1rem; cursor: pointer; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .btn-add {
      padding: 10px 22px;
      background: var(--accent); color: #0d0f14;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: .9rem; cursor: pointer; transition: opacity .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-add:hover { opacity: .85; }
    .btn-settings {
      padding: 10px 16px;
      background: var(--border); color: var(--muted);
      border: none; border-radius: 10px;
      font-size: .85rem; cursor: pointer; transition: background .2s;
    }
    .btn-settings:hover { background: var(--card); color: var(--text); }

    /* ── FILTERS ── */
    .filters {
      padding: 20px 40px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: .85rem;
      cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); font-weight: 600; }
    .search-wrap { margin-left: auto; }
    .search-wrap input {
      padding: 8px 16px; background: var(--card);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .85rem;
      outline: none; width: 220px; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent2); }

    /* ── GRID ── */
    main { padding: 32px 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .empty-state {
      grid-column: 1/-1;
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .empty-state svg { opacity: .3; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; margin-bottom: 8px; }

    /* ── CARD ── */
    .prod-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .prod-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.4); }
    .card-img {
      width: 100%; height: 200px; object-fit: cover;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 2.5rem;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 18px; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .card-name { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; }
    .card-supplier { font-size: .8rem; color: var(--muted); margin-bottom: 12px; }
    .status-badge {
      padding: 4px 12px; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      white-space: nowrap;
    }
    .status-aceptado    { background: rgba(78,203,141,.15); color: var(--success); }
    .status-rechazado   { background: rgba(242,92,92,.15);  color: var(--danger);  }
    .status-prueba      { background: rgba(240,160,68,.15); color: var(--warning); }
    .status-revision    { background: rgba(183,126,247,.15);color: var(--review);  }
    .status-devuelto    { background: rgba(79,142,247,.15); color: var(--info);    }

    .card-detail {
      font-size: .82rem; color: var(--muted);
      background: var(--surface); border-radius: 8px;
      padding: 8px 10px; margin-top: 10px;
      line-height: 1.5;
    }
    .card-detail strong { color: var(--text); }
    .card-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-edit, .btn-del {
      flex: 1; padding: 8px;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .82rem;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-edit { background: var(--border); color: var(--text); }
    .btn-edit:hover { background: var(--accent2); color: #fff; }
    .btn-del  { background: rgba(242,92,92,.12); color: var(--danger); }
    .btn-del:hover  { background: rgba(242,92,92,.25); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px;
      width: 560px; max-width: 96vw; max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-full { grid-column: 1/-1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 11px 13px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent2); }
    .form-group select option { background: var(--card); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .conditional-field { display: none; }
    .conditional-field.visible { display: flex; }
    .img-preview {
      width: 100%; height: 160px;
      background: var(--surface); border: 2px dashed var(--border);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; cursor: pointer;
      transition: border-color .2s;
    }
    .img-preview:hover { border-color: var(--accent); }
    .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview-placeholder { color: var(--muted); text-align: center; font-size: .85rem; }
    .img-preview-placeholder span { font-size: 2rem; display: block; margin-bottom: 6px; }
    #img-input { display: none; }
    .modal-actions { display: flex; gap: 12px; margin-top: 28px; }
    .btn-cancel {
      flex: 1; padding: 12px;
      background: var(--border); color: var(--text);
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      transition: background .2s;
    }
    .btn-cancel:hover { background: var(--surface); }
    .btn-save {
      flex: 2; padding: 12px;
      background: var(--accent); color: #0d0f14;
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: .85; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px;
      font-size: .9rem; z-index: 999;
      transform: translateY(80px); opacity: 0;
      transition: all .3s; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--danger);  color: var(--danger);  }

    /* ── LOADING ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap { display: flex; justify-content: center; padding: 60px; }

    @media (max-width: 600px) {
      header, .filters, main { padding-left: 20px; padding-right: 20px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- CONFIG OVERLAY -->
<div id="config-overlay">
  <div class="config-box">
    <h2>⚙️ Configuración Supabase</h2>
    <p>Ingresa tus credenciales de Supabase para conectar la base de datos. Puedes obtenerlas en <strong>supabase.com → Project Settings → API</strong>.</p>
    <label>Project URL</label>
    <input id="sb-url" type="text" placeholder="https://xxxx.supabase.co" />
    <label>Anon Key</label>
    <input id="sb-key" type="text" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
    <button class="btn-primary" onclick="saveConfig()">Conectar →</button>
    <p style="margin-top:14px;font-size:.78rem;color:var(--muted);">
      📋 SQL para crear la tabla: <code style="color:var(--accent)">ver consola del navegador</code>
    </p>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">TRACK<span>.</span>PRO</div>
  <div class="header-actions">
    <button class="btn-settings" onclick="showConfig()">⚙️ Supabase</button>
    <button class="btn-add" onclick="openModal()">＋ Nuevo Producto</button>
  </div>
</header>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('aceptado', this)">✅ Aceptados</button>
  <button class="filter-btn" onclick="setFilter('rechazado', this)">❌ Rechazados</button>
  <button class="filter-btn" onclick="setFilter('prueba', this)">🧪 En Prueba</button>
  <button class="filter-btn" onclick="setFilter('revision', this)">🔍 En Revisión</button>
  <button class="filter-btn" onclick="setFilter('devuelto', this)">↩️ Devuelto</button>
  <div class="search-wrap">
    <input id="search-input" type="text" placeholder="🔎 Buscar producto o proveedor…" oninput="renderGrid()"/>
  </div>
</div>

<!-- MAIN GRID -->
<main>
  <div class="loading-wrap" id="loading"><div class="spinner"></div></div>
  <div class="grid" id="grid" style="display:none"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Nuevo Producto</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Foto del Producto</label>
        <div class="img-preview" id="img-preview" onclick="document.getElementById('img-input').click()">
          <div class="img-preview-placeholder"><span>📷</span>Haz clic para subir imagen</div>
        </div>
        <input type="file" id="img-input" accept="image/*" onchange="previewImage(event)"/>
      </div>
      <div class="form-group">
        <label>Nombre del Producto *</label>
        <input id="f-name" type="text" placeholder="Ej: Camiseta básica" />
      </div>
      <div class="form-group">
        <label>Proveedor *</label>
        <input id="f-supplier" type="text" placeholder="Ej: Textiles SA" />
      </div>
      <div class="form-group form-full">
        <label>Estado *</label>
        <select id="f-status" onchange="handleStatusChange()">
          <option value="">— Seleccionar —</option>
          <option value="aceptado">✅ Aceptado</option>
          <option value="rechazado">❌ Rechazado</option>
          <option value="prueba">🧪 En Prueba</option>
          <option value="revision">🔍 En Revisión</option>
          <option value="devuelto">↩️ Devuelto al Proveedor</option>
        </select>
      </div>
      <!-- Devuelto: modificaciones -->
      <div class="form-group form-full conditional-field" id="cf-mod">
        <label>Modificaciones Solicitadas</label>
        <textarea id="f-mod" placeholder="Describe las modificaciones pedidas al proveedor…"></textarea>
      </div>
      <!-- En Prueba: conjunto -->
      <div class="form-group form-full conditional-field" id="cf-set">
        <label>Conjunto / Colección de Prueba</label>
        <input id="f-set" type="text" placeholder="Ej: Colección Primavera 2025, Set A" />
      </div>
      <div class="form-group form-full">
        <label>Notas adicionales</label>
        <textarea id="f-notes" placeholder="Observaciones generales…" style="min-height:60px"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveProduct()">💾 Guardar Producto</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ═══════════════════════════════════════════
   CONFIG & SUPABASE INIT
═══════════════════════════════════════════ */
let supabaseClient = null;
let products = [];
let currentFilter = 'todos';
let editingId = null;
let imgBase64 = null;
const BUCKET = 'product-images';
const TABLE  = 'productos';

const SQL_HINT = `
-- Ejecuta este SQL en Supabase → SQL Editor:

create table if not exists productos (
  id          uuid primary key default gen_random_uuid(),
  nombre      text not null,
  proveedor   text not null,
  estado      text not null,
  modificaciones text,
  conjunto    text,
  notas       text,
  foto_url    text,
  created_at  timestamptz default now()
);

-- Storage bucket (en Supabase → Storage → New bucket):
-- Nombre: product-images  |  Public: ON
`;
console.log('%c📋 SQL para crear tabla:', 'color:#e8c547;font-weight:bold;font-size:14px');
console.log(SQL_HINT);

function saveConfig() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) { showToast('Completa ambos campos', 'error'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  initSupabase(url, key);
}

function showConfig() {
  document.getElementById('config-overlay').style.display = 'flex';
}

function initSupabase(url, key) {
  try {
    supabaseClient = supabase.createClient(url, key);
    document.getElementById('config-overlay').style.display = 'none';
    loadProducts();
    showToast('✅ Conectado a Supabase', 'success');
  } catch(e) {
    showToast('Error al conectar: ' + e.message, 'error');
  }
}

// Auto-connect if saved
const savedUrl = localStorage.getItem('sb_url');
const savedKey = localStorage.getItem('sb_key');
if (savedUrl && savedKey) {
  document.getElementById('sb-url').value = savedUrl;
  document.getElementById('sb-key').value = savedKey;
  initSupabase(savedUrl, savedKey);
} else {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
}

/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
async function loadProducts() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('grid').style.display = 'none';
  const { data, error } = await supabaseClient
    .from(TABLE).select('*').order('created_at', { ascending: false });
  document.getElementById('loading').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
  if (error) { showToast('Error cargando datos: ' + error.message, 'error'); return; }
  products = data || [];
  renderGrid();
}

async function saveProduct() {
  const nombre    = document.getElementById('f-name').value.trim();
  const proveedor = document.getElementById('f-supplier').value.trim();
  const estado    = document.getElementById('f-status').value;
  const mod       = document.getElementById('f-mod').value.trim();
  const conjunto  = document.getElementById('f-set').value.trim();
  const notas     = document.getElementById('f-notes').value.trim();

  if (!nombre || !proveedor || !estado) {
    showToast('Completa los campos obligatorios (*)', 'error'); return;
  }

  let foto_url = editingId ? (products.find(p=>p.id===editingId)?.foto_url || null) : null;

  // Upload image if new
  if (imgBase64 && supabaseClient) {
    const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
    const blob = base64ToBlob(imgBase64);
    const { data: upData, error: upErr } = await supabaseClient
      .storage.from(BUCKET).upload(filename, blob, { contentType: 'image/jpeg', upsert: false });
    if (upErr) { showToast('Error subiendo imagen: ' + upErr.message, 'error'); return; }
    const { data: urlData } = supabaseClient.storage.from(BUCKET).getPublicUrl(filename);
    foto_url = urlData.publicUrl;
  }

  const payload = {
    nombre, proveedor, estado,
    modificaciones: estado === 'devuelto' ? mod : null,
    conjunto:       estado === 'prueba'   ? conjunto : null,
    notas: notas || null,
    foto_url
  };

  let error;
  if (editingId) {
    ({ error } = await supabaseClient.from(TABLE).update(payload).eq('id', editingId));
  } else {
    ({ error } = await supabaseClient.from(TABLE).insert([payload]));
  }

  if (error) { showToast('Error guardando: ' + error.message, 'error'); return; }
  showToast(editingId ? '✏️ Producto actualizado' : '✅ Producto guardado', 'success');
  closeModal();
  loadProducts();
}

async function deleteProduct(id, e) {
  e.stopPropagation();
  if (!confirm('¿Eliminar este producto?')) return;
  const { error } = await supabaseClient.from(TABLE).delete().eq('id', id);
  if (error) { showToast('Error eliminando: ' + error.message, 'error'); return; }
  showToast('🗑️ Producto eliminado', 'success');
  loadProducts();
}

function editProduct(id, e) {
  e.stopPropagation();
  const p = products.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Editar Producto';
  document.getElementById('f-name').value     = p.nombre || '';
  document.getElementById('f-supplier').value = p.proveedor || '';
  document.getElementById('f-status').value   = p.estado || '';
  document.getElementById('f-mod').value      = p.modificaciones || '';
  document.getElementById('f-set').value      = p.conjunto || '';
  document.getElementById('f-notes').value    = p.notas || '';
  imgBase64 = null;
  const prev = document.getElementById('img-preview');
  if (p.foto_url) {
    prev.innerHTML = `<img src="${p.foto_url}" alt="foto"/>`;
  } else {
    prev.innerHTML = `<div class="img-preview-placeholder"><span>📷</span>Haz clic para subir imagen</div>`;
  }
  handleStatusChange();
  document.getElementById('modal').classList.add('open');
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
const STATUS_LABEL = {
  aceptado: '✅ Aceptado',
  rechazado: '❌ Rechazado',
  prueba: '🧪 En Prueba',
  revision: '🔍 En Revisión',
  devuelto: '↩️ Devuelto',
};

function renderGrid() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const grid = document.getElementById('grid');
  let list = products;
  if (currentFilter !== 'todos') list = list.filter(p => p.estado === currentFilter);
  if (q) list = list.filter(p =>
    p.nombre?.toLowerCase().includes(q) || p.proveedor?.toLowerCase().includes(q)
  );

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect width="64" height="64" rx="16" fill="#252a38"/>
        <path d="M20 44V28l12-8 12 8v16H20z" stroke="#7a8099" stroke-width="2" fill="none"/>
        <path d="M28 44v-8h8v8" stroke="#7a8099" stroke-width="2" fill="none"/>
      </svg>
      <h3>Sin productos</h3>
      <p>Agrega un producto o cambia el filtro</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const imgHtml = p.foto_url
      ? `<img src="${p.foto_url}" alt="${p.nombre}"/>`
      : `<span>📦</span>`;
    const statusClass = 'status-' + p.estado;
    const statusLabel = STATUS_LABEL[p.estado] || p.estado;
    let extraDetail = '';
    if (p.estado === 'devuelto' && p.modificaciones)
      extraDetail = `<div class="card-detail"><strong>Modificaciones:</strong> ${escHtml(p.modificaciones)}</div>`;
    if (p.estado === 'prueba' && p.conjunto)
      extraDetail = `<div class="card-detail"><strong>Conjunto:</strong> ${escHtml(p.conjunto)}</div>`;
    if (p.notas)
      extraDetail += `<div class="card-detail" style="margin-top:6px"><strong>Notas:</strong> ${escHtml(p.notas)}</div>`;
    return `
    <div class="prod-card">
      <div class="card-img">${imgHtml}</div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${escHtml(p.nombre)}</div>
          <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>
        <div class="card-supplier">🏭 ${escHtml(p.proveedor)}</div>
        ${extraDetail}
        <div class="card-actions">
          <button class="btn-edit" onclick="editProduct('${p.id}', event)">✏️ Editar</button>
          <button class="btn-del"  onclick="deleteProduct('${p.id}', event)">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════ */
function openModal() {
  editingId = null; imgBase64 = null;
  document.getElementById('modal-title').textContent = 'Nuevo Producto';
  document.getElementById('f-name').value = '';
  document.getElementById('f-supplier').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-mod').value = '';
  document.getElementById('f-set').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('img-preview').innerHTML =
    `<div class="img-preview-placeholder"><span>📷</span>Haz clic para subir imagen</div>`;
  handleStatusChange();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function handleStatusChange() {
  const v = document.getElementById('f-status').value;
  document.getElementById('cf-mod').classList.toggle('visible', v === 'devuelto');
  document.getElementById('cf-set').classList.toggle('visible', v === 'prueba');
}

function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imgBase64 = ev.target.result;
    document.getElementById('img-preview').innerHTML =
      `<img src="${imgBase64}" alt="preview"/>`;
  };
  reader.readAsDataURL(file);
}

/* ═══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function base64ToBlob(base64) {
  const parts = base64.split(';base64,');
  const contentType = parts[0].split(':')[1];
  const raw = atob(parts[1]);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return new Blob([arr], { type: contentType });
}
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
